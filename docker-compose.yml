version: '3.8' # Versión de la especificación de docker-compose

services:
  # Servicio de Base de Datos
  db:
    image: postgres:16.0
    container_name: db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data

  # Servicio del ERP Odoo
  odoo:
    image: odoo:latest
    container_name: odoo
    restart: unless-stopped
    depends_on:
      - db # Obliga a que la base de datos arranque antes
    ports:
      - "8200:8069" # Mapeo de puertos solicitado en el reto
    volumes:
      - odoo-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    # Comando para inicializar la base de datos automáticamente
    command: odoo -d odoo --db_user=odoo --db_password=odoo -i base

volumes:
  odoo-data:
  db-data: